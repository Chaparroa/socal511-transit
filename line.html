<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- Title and meta set dynamically once route data loads -->
  <title>Loading… · SoCal 511 Transit</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --route-color: #0072CE;
      --bg:    #1A2535;
      --text:  #FFFFFF;
      --muted: rgba(255,255,255,0.6);
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── HEADER ── */
    #header {
      background: var(--route-color);
      padding: 10px 14px 8px;
      flex-shrink: 0;
      z-index: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #header-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #back-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn:hover { background: rgba(255,255,255,0.28); }

    #route-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #route-number {
      background: #fff;
      color: var(--route-color);
      font-weight: 900;
      font-size: 1.15rem;
      padding: 2px 10px;
      border-radius: 6px;
      letter-spacing: 0.3px;
      line-height: 1.6;
      min-width: 44px;
      text-align: center;
    }

    #route-name {
      font-size: 0.72rem;
      font-weight: 500;
      opacity: 0.85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    #direction-section {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      justify-content: flex-end;
    }

    #direction-label {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(255,255,255,0.9);
    }

    #direction-toggle {
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 30px;
    }
    #direction-toggle:hover,
    #direction-toggle:active { background: rgba(255,255,255,0.3); }
    #direction-toggle:disabled { opacity: 0.45; cursor: default; }

    #status-bar {
      margin-top: 5px;
      font-size: 0.68rem;
      color: var(--muted);
      min-height: 1em;
    }

    #last-updated.stale { color: #FFE066; font-weight: 600; opacity: 1; }

    /* ── MAP ── */
    #map {
      flex: 1;
      min-height: 0;
      z-index: 1;
    }

    /* ── LOCATE BUTTON ── */
    #locate-btn {
      position: absolute;
      bottom: 100px;
      right: 12px;
      z-index: 400;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #locate-btn:hover { background: #f0f4ff; }
    #locate-btn.active { background: #e8f1fd; }

    /* ── VEHICLE COUNT PILL ── */
    #vehicle-count {
      position: absolute;
      bottom: 152px;
      right: 12px;
      z-index: 400;
      background: rgba(26,37,53,0.88);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      pointer-events: none;
      display: none;
    }

    /* ── LOADING OVERLAY ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 1rem;
      color: #fff;
    }
    #loading.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text { font-size: 0.9rem; opacity: 0.7; }

    /* ── ERROR BANNER ── */
    #error-banner {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 600;
      background: #C8222F;
      color: #fff;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ── STOP MARKERS ── */
    .stop-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid var(--route-color, #0072CE);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── VEHICLE MARKERS (Transit-app style) ── */
    .vehicle-marker {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--vc, #E16710);
      border: 2.5px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.72rem;
      color: #fff;
      position: relative;
      transform-origin: center center;
    }
    /* Direction arrow */
    .vehicle-marker::after {
      content: '';
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 7px solid var(--vc, #E16710);
    }

    /* ── USER LOCATION ── */
    .user-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #0072CE;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,114,206,0.5);
    }
    .user-dot-pulse {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,114,206,0.15);
      border: 1px solid rgba(0,114,206,0.3);
    }

    /* ── POPUP STYLES ── */
    .pop { min-width: 180px; }
    .pop-title { font-size: 0.9rem; font-weight: 700; color: #111; margin-bottom: 8px; display: block; }
    .pop-row { font-size: 0.8rem; color: #555; padding: 2px 0; }
    .pop-row span { font-weight: 600; color: #222; }
    .pop-next-stop {
      margin-top: 8px;
      padding: 8px 10px;
      background: #f0f4f8;
      border-radius: 8px;
      border-left: 3px solid var(--route-color, #0072CE);
    }
    .pop-next-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 3px; }
    .pop-next-name  { font-size: 0.85rem; font-weight: 700; color: #111; }
    .pop-eta        { font-size: 0.78rem; font-weight: 600; color: var(--route-color, #0072CE); margin-top: 2px; }
    .pop-status { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin-top: 6px; background: #e8f5e9; color: #2e7d32; }
    .pop-status.stopped { background: #fff3e0; color: #e65100; }

    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 3px 16px rgba(0,0,0,0.2); }
    .leaflet-popup-content { margin: 12px 14px; }
  </style>
</head>
<body>

  <header id="header">
    <div id="header-top">
      <a href="/" id="back-btn" aria-label="Back to line picker">←</a>
      <div id="route-badge">
        <span id="route-number">…</span>
        <span id="route-name">Loading…</span>
      </div>
      <div id="direction-section">
        <span id="direction-label"></span>
        <button id="direction-toggle" disabled aria-label="Switch direction">⇅</button>
      </div>
    </div>
    <div id="status-bar">
      <span id="last-updated">Connecting…</span>
    </div>
  </header>

  <div id="error-banner"></div>

  <div id="map"></div>
  <button id="locate-btn" title="Show my location" aria-label="Show my location">📍</button>
  <div id="vehicle-count"></div>

  <div id="loading" aria-live="polite">
    <div class="spinner"></div>
    <div id="loading-text">Loading route data…</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module">
  import { AGENCIES } from '/js/config.js';

  // ── PARSE ROUTE FROM URL ──
  // URL pattern: /line/{agency}-{routeCode}  e.g. /line/metro-207  /line/metro-G
  const slug    = location.pathname.split('/line/')[1] || '';
  const dashIdx = slug.indexOf('-');
  const agencyId   = dashIdx > -1 ? slug.slice(0, dashIdx).toLowerCase() : 'metro';
  const routeCode  = dashIdx > -1 ? slug.slice(dashIdx + 1).toUpperCase() : slug.toUpperCase();

  // G and J are BRT busways — WebSocket uses numeric codes
  const WS_ALIAS = { 'G': '901', 'J': '910' };
  const wsRouteCode = WS_ALIAS[routeCode] || routeCode;

  const agencyConfig = AGENCIES[agencyId] || AGENCIES.metro;

  // ── STATE ──
  const state = {
    direction:       0,
    routeInfo:       null,
    stopsAll:        [],
    dayType:         getDayType(),
    vehicles:        new Map(),
    lastUpdatedTime: null,
    locating:        false,
    userLatLng:      null,
  };

  // ── MAP ──
  const map = L.map('map', { zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20,
  }).addTo(map);

  const routeLayer   = L.featureGroup().addTo(map);
  const stopsLayer   = L.featureGroup().addTo(map);
  const vehicleLayer = L.featureGroup().addTo(map);
  const vehicleMarkers = new Map();

  // ── HELPERS ──
  function getDayType() {
    const d = new Date().getDay();
    if (d === 0) return 'sunday';
    if (d === 6) return 'saturday';
    return 'weekday';
  }

  function parseDepartureTimes(str) {
    return (str || '').match(/\d+:\d+:\d+/g) || [];
  }

  function timeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function minutesToDisplay(totalMins) {
    const h = Math.floor(totalMins / 60) % 24;
    const m = totalMins % 60;
    const period = h >= 12 ? 'PM' : 'AM';
    return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${period}`;
  }

  function getNextArrivals(times, count = 3) {
    const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
    const all = [...new Set(times.map(timeToMinutes))].sort((a, b) => a - b);
    return all.filter(m => m >= nowMins).slice(0, count).map(minutesToDisplay);
  }

  function getDirectionStops() {
    return state.stopsAll
      .filter(s => s.direction_id === state.direction && s.day_type === state.dayType)
      .sort((a, b) => a.stop_sequence - b.stop_sequence);
  }

  function formatStatus(raw) {
    if (!raw) return 'En route';
    return raw.replace(/_/g, ' ').toLowerCase()
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  // ── STOP LOOKUP MAP (built once stops load) ──
  const stopMap = new Map(); // stop_id string → { name, lat, lng }

  function buildStopMap() {
    state.stopsAll.forEach(s => {
      stopMap.set(String(s.stop_id), {
        name: s.stop_name,
        lat:  s.geometry.coordinates[1],
        lng:  s.geometry.coordinates[0],
      });
    });
  }

  // ── HAVERSINE DISTANCE (meters) ──
  function distanceMeters(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2
            + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  // ── ETA TEXT ──
  function getETAText(pos, stop, currentStatus) {
    if (currentStatus === 'STOPPED_AT') return 'At this stop';
    const speed = pos?.speed || 0; // m/s
    if (speed < 0.5) return 'Stopped nearby';
    const dist = distanceMeters(pos.latitude, pos.longitude, stop.lat, stop.lng);
    const mins  = Math.round(dist / speed / 60);
    if (mins < 1) return 'Arriving now';
    return `~${mins} min away`;
  }

  // ── APPLY ROUTE COLOR ──
  function applyRouteColor(color) {
    const hex = color ? `#${color}` : agencyConfig.color;
    document.documentElement.style.setProperty('--route-color', hex);
    document.getElementById('header').style.background = hex;
    document.getElementById('route-number').style.color = hex;
  }

  // ── SAVE TO RECENTLY VIEWED ──
  function saveRecent() {
    if (!state.routeInfo) return;
    const color = state.routeInfo.route_color
      ? `#${state.routeInfo.route_color}` : agencyConfig.color;
    const label = `${agencyConfig.shortName} ${routeCode}`;
    const item  = { slug, label, color };
    const recent = JSON.parse(localStorage.getItem('recent_lines') || '[]')
      .filter(r => r.slug !== slug);
    recent.unshift(item);
    localStorage.setItem('recent_lines', JSON.stringify(recent.slice(0, 12)));
  }

  // ── ICONS ──
  const stopIcon = L.divIcon({
    html:        '<div class="stop-dot"></div>',
    className:   '',
    iconSize:    [10, 10],
    iconAnchor:  [5, 5],
    popupAnchor: [0, -10],
  });

  function makeVehicleIcon(routeNum, color, bearing) {
    const bg = color || agencyConfig.color;
    return L.divIcon({
      html: `<div class="vehicle-marker" style="--vc:${bg}; transform:rotate(${bearing || 0}deg)">${routeNum}</div>`,
      className:   '',
      iconSize:    [32, 32],
      iconAnchor:  [16, 16],
      popupAnchor: [0, -20],
    });
  }

  // ── RENDER ROUTE LINE ──
  function renderRoute() {
    routeLayer.clearLayers();
    const stops = getDirectionStops();
    if (!stops.length) return;
    const latlngs = stops.map(s => [s.geometry.coordinates[1], s.geometry.coordinates[0]]);
    L.polyline(latlngs, {
      color:   document.documentElement.style.getPropertyValue('--route-color') || agencyConfig.color,
      weight:  5,
      opacity: 0.85,
    }).addTo(routeLayer);
  }

  // ── RENDER STOPS ──
  function renderStops() {
    stopsLayer.clearLayers();
    getDirectionStops().forEach(stop => {
      const [lng, lat] = stop.geometry.coordinates;
      const times = parseDepartureTimes(stop.departure_times);
      L.marker([lat, lng], { icon: stopIcon })
        .bindPopup(() => {
          const next = getNextArrivals(times);
          const timesHtml = next.length
            ? next.map(t => `<div class="pop-row">🕐 <span>${t}</span></div>`).join('')
            : '<div class="pop-row" style="color:#999;font-style:italic">No more arrivals today</div>';
          return `
            <div class="pop">
              <span class="pop-title">${stop.stop_name}</span>
              <div class="pop-row" style="font-size:0.72rem;color:#999;margin-bottom:4px">Scheduled arrivals</div>
              ${timesHtml}
            </div>`;
        }, { maxWidth: 220 })
        .addTo(stopsLayer);
    });
  }

  // ── RENDER / UPDATE VEHICLE ──
  const routeColor = () =>
    document.documentElement.style.getPropertyValue('--route-color') || agencyConfig.color;

  function updateVehicle(vehicleId, data) {
    const dirId = data.vehicle?.trip?.directionId;
    const pos   = data.vehicle?.position;

    if (dirId !== state.direction || !pos?.latitude || !pos?.longitude) {
      if (vehicleMarkers.has(vehicleId)) {
        vehicleMarkers.get(vehicleId).remove();
        vehicleMarkers.delete(vehicleId);
      }
      return;
    }

    const { latitude: lat, longitude: lng, bearing } = pos;
    const label      = data.vehicle?.vehicle?.label || vehicleId;
    const status     = data.vehicle?.currentStatus || '';
    const stopId     = data.vehicle?.stopId || '';
    const icon       = makeVehicleIcon(routeCode, routeColor(), bearing);

    const isMoving   = status === 'IN_TRANSIT_TO';
    const statusText = formatStatus(status);
    const nextStop   = stopMap.get(String(stopId));
    const stopLabel  = isMoving ? 'Next stop' : 'At stop';
    const eta        = nextStop ? getETAText(pos, nextStop, status) : '';

    const popHtml = `
      <div class="pop">
        <span class="pop-title">Bus ${label}</span>
        <div class="pop-row">Route <span>${routeCode}</span> &nbsp;·&nbsp; ${Math.round((pos.speed || 0) * 3.6)} km/h</div>
        ${nextStop ? `
        <div class="pop-next-stop">
          <div class="pop-next-label">${stopLabel}</div>
          <div class="pop-next-name">${nextStop.name}</div>
          ${eta ? `<div class="pop-eta">${eta}</div>` : ''}
        </div>` : stopId ? `<div class="pop-row">Stop <span>#${stopId}</span></div>` : ''}
        <span class="pop-status ${isMoving ? '' : 'stopped'}">${statusText}</span>
      </div>`;

    if (vehicleMarkers.has(vehicleId)) {
      const m = vehicleMarkers.get(vehicleId);
      m.setLatLng([lat, lng]);
      m.setIcon(icon);
    } else {
      const m = L.marker([lat, lng], { icon, zIndexOffset: 1000 })
        .bindPopup(popHtml, { maxWidth: 220 })
        .addTo(vehicleLayer);
      vehicleMarkers.set(vehicleId, m);
    }
  }

  function refreshAllVehicles() {
    vehicleMarkers.forEach(m => m.remove());
    vehicleMarkers.clear();
    state.vehicles.forEach((data, id) => updateVehicle(id, data));
    updateVehicleCount();
  }

  function updateVehicleCount() {
    const el = document.getElementById('vehicle-count');
    const n  = vehicleMarkers.size;
    if (n === 0) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.textContent = `${n} bus${n === 1 ? '' : 'es'} active`;
  }

  // ── STATUS BAR ──
  function updateStatus() {
    const el  = document.getElementById('last-updated');
    const now = Date.now();
    if (!state.lastUpdatedTime) {
      el.textContent = 'Waiting for live positions…';
      el.className   = '';
      return;
    }
    const ago = now - state.lastUpdatedTime.getTime();
    const t   = state.lastUpdatedTime.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    if (ago > 2 * 60 * 1000) {
      el.textContent = `⚠️ Data may be stale — last received ${t}`;
      el.className   = 'stale';
    } else {
      el.textContent = `Last updated ${t}`;
      el.className   = '';
    }
  }

  function updateDirectionUI() {
    if (!state.routeInfo) return;
    const info = state.routeInfo;
    const dir  = state.direction;
    const label = dir === 0
      ? `${info.travel_direction_0} to ${info.terminal_2}`
      : `${info.travel_direction_1} to ${info.terminal_1}`;
    const toggleTxt = dir === 0 ? info.travel_direction_1 : info.travel_direction_0;
    document.getElementById('direction-label').textContent  = label;
    document.getElementById('direction-toggle').textContent = `⇅ ${toggleTxt}`;
  }

  // ── WEBSOCKET (connects directly — no CORS restriction on WS) ──
  let ws           = null;
  let wsRetryTimer = null;

  function connectWS() {
    if (ws?.readyState === WebSocket.OPEN || ws?.readyState === WebSocket.CONNECTING) return;
    const url = `${agencyConfig.wsBase}/${wsRouteCode}`;

    ws = new WebSocket(url);

    ws.onmessage = ({ data }) => {
      try {
        const msg = JSON.parse(data);
        if (msg.id && msg.vehicle) {
          state.vehicles.set(msg.id, msg);
          state.lastUpdatedTime = new Date();
          updateVehicle(msg.id, msg);
          updateVehicleCount();
          updateStatus();
        }
      } catch {}
    };

    ws.onclose = () => {
      ws = null;
      wsRetryTimer = setTimeout(connectWS, 5000);
    };

    ws.onerror = () => {};
  }

  function disconnectWS() {
    clearTimeout(wsRetryTimer);
    if (ws) { ws.onclose = null; ws.close(); ws = null; }
  }

  // Reconnect when tab comes back into focus
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      disconnectWS();
    } else {
      state.vehicles.clear();
      refreshAllVehicles();
      state.lastUpdatedTime = null;
      updateStatus();
      connectWS();
    }
  });

  // ── DIRECTION TOGGLE ──
  document.getElementById('direction-toggle').addEventListener('click', () => {
    state.direction = state.direction === 0 ? 1 : 0;
    updateDirectionUI();
    renderRoute();
    renderStops();
    refreshAllVehicles();
    if (routeLayer.getBounds().isValid()) {
      map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
    }
  });

  // ── USER LOCATION ──
  let userMarker      = null;
  let userPulseMarker = null;

  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) return;
    const btn = document.getElementById('locate-btn');
    btn.classList.add('active');
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      state.userLatLng = [lat, lng];
      if (userMarker)      { userMarker.setLatLng([lat, lng]); }
      else {
        userPulseMarker = L.marker([lat, lng], {
          icon: L.divIcon({ html: '<div class="user-dot-pulse"></div>', className: '', iconSize: [40,40], iconAnchor: [20,20] }),
          zIndexOffset: 500,
        }).addTo(map);
        userMarker = L.marker([lat, lng], {
          icon: L.divIcon({ html: '<div class="user-dot"></div>', className: '', iconSize: [16,16], iconAnchor: [8,8] }),
          zIndexOffset: 501,
        }).addTo(map);
      }
      map.setView([lat, lng], 14);
      btn.classList.remove('active');
    }, () => btn.classList.remove('active'));
  });

  // ── SHOW ERROR ──
  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── INIT ──
  async function init() {
    document.getElementById('loading-text').textContent = `Loading route ${routeCode}…`;

    try {
      const res = await fetch(`/api/route?route=${routeCode}&agency=${agencyId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { route, stops } = await res.json();

      if (json.unavailable) throw Object.assign(new Error(json.error), { unavailable: true });
      if (!route) throw new Error(`Route ${routeCode} not found`);

      state.routeInfo = route;
      state.stopsAll  = stops;
      buildStopMap();

      // Update page metadata
      const routeName = route.route_long_name || route.route_desc || 'Metro Line';
      document.title = `Route ${routeCode} · ${routeName} · SoCal 511 Transit`;
      document.getElementById('route-number').textContent = routeCode;
      document.getElementById('route-name').textContent   = routeName;
      document.getElementById('direction-toggle').disabled = false;

      applyRouteColor(route.route_color);
      updateDirectionUI();
      renderRoute();
      renderStops();
      saveRecent();

      if (routeLayer.getBounds().isValid()) {
        map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
      }

      document.getElementById('loading').classList.add('hidden');
      updateStatus();
      connectWS();
      setInterval(updateStatus, 15000);

    } catch (err) {
      document.getElementById('loading').classList.add('hidden');
      if (err.unavailable) {
        showError(`Metro ${routeCode} Line — ${err.message}`);
      } else {
        showError(`Could not load route ${routeCode}: ${err.message}`);
      }
    }
  }

  init();
  </script>
</body>
</html>
