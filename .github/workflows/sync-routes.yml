name: Sync Metro Routes

on:
  schedule:
    # Runs on the 1st of every month at 10:00 AM UTC.
    # Metro does major service changes in June and December;
    # monthly cadence catches anything mid-cycle too.
    - cron: '0 10 1 * *'
  workflow_dispatch:  # allow a manual run from the Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch active Metro routes
        run: node api/scripts/fetch-routes.js --write

      - name: Check for file changes
        id: diff
        run: |
          if git diff --quiet api/routes.js api/nearby.js api/stop-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "--- routes.js diff ---"
            git diff api/routes.js
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/routes.js api/nearby.js api/stop-index.json
          git commit -m "chore: sync Metro bus routes and stop index"
          git push
