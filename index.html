<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoCal 511 Transit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --metro:   #0072CE;
      --bg:      #F4F6F9;
      --surface: #FFFFFF;
      --border:  #E2E8F0;
      --text:    #0F1923;
      --muted:   #64748B;
      --subtle:  #94A3B8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── APP BAR ── */
    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .wordmark {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .wordmark span { font-weight: 400; color: var(--muted); }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #16A34A;
      background: #DCFCE7;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #16A34A;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── SEARCH HERO ── */
    .search-hero {
      background: #fff;
      padding: 18px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .search-form {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 4px 0 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-form:focus-within {
      border-color: var(--metro);
      box-shadow: 0 0 0 3px rgba(0,114,206,0.12);
    }
    .search-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      color: var(--subtle);
    }
    .search-input {
      flex: 1;
      padding: 11px 10px;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: var(--subtle); }
    .search-btn {
      padding: 8px 14px;
      background: var(--metro);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .search-btn:hover { background: #005fad; }

    .locate-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .locate-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      background: none;
      border: none;
      color: var(--metro);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .locate-btn:hover { text-decoration: underline; }
    .locate-btn svg { width: 15px; height: 15px; }
    .locate-spinner {
      width: 15px; height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--metro);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .locate-area {
      font-size: 0.82rem;
      color: var(--muted);
      display: none;
    }

    /* ── MAIN ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 4rem;
    }

    /* ── SECTION HEAD ── */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .browse-link {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--metro);
      text-decoration: none;
    }
    .browse-link:hover { text-decoration: underline; }

    /* ── RECENTLY VIEWED ── */
    #recent-section { display: none; margin-bottom: 2rem; }
    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .recent-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      transition: border-color 0.12s, color 0.12s;
    }
    .recent-chip:hover { border-color: var(--metro); color: var(--metro); }
    .recent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── NEARBY SECTION ── */
    #nearby-section { display: none; margin-bottom: 2.25rem; }

    /* ── ROUTE GRID ── */
    .bus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap: 8px;
      margin-bottom: 2rem;
    }

    .bus-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s;
    }
    .bus-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      transform: translateY(-1px);
      border-color: #C9D9F0;
    }

    .bus-badge {
      background: var(--metro);
      color: #fff;
      font-weight: 800;
      font-size: 0.88rem;
      padding: 3px 8px;
      border-radius: 7px;
      min-width: 38px;
      text-align: center;
      letter-spacing: -0.01em;
    }

    .bus-desc {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 66px;
    }

    /* ── AGENCY CARD (BBB) ── */
    .section-other { margin-bottom: 2rem; }
    .agency-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .agency-badge {
      font-weight: 800;
      font-size: 0.78rem;
      padding: 6px 10px;
      border-radius: 8px;
      flex-shrink: 0;
      color: #fff;
    }
    .agency-badge.bbb { background: #2A5FA5; }
    .agency-info { font-size: 0.84rem; line-height: 1.5; }
    .agency-info strong { font-size: 0.88rem; color: var(--text); }
    .agency-info p { color: var(--muted); margin-top: 2px; }

    @media (max-width: 440px) {
      .bus-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .bus-badge { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<!-- APP BAR -->
<header class="app-bar">
  <span class="wordmark">SoCal 511 <span>Transit</span></span>
  <div class="live-pill">
    <span class="live-dot"></span>
    LIVE
  </div>
</header>

<!-- SEARCH HERO -->
<div class="search-hero">
  <form class="search-form" id="search-form" role="search">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <circle cx="8.5" cy="8.5" r="5.5"/>
      <line x1="12.5" y1="12.5" x2="17" y2="17"/>
    </svg>
    <input class="search-input" id="search-input" type="search"
      placeholder="Route number (720, 4, G…)" autocomplete="off"
      aria-label="Search for a route" />
    <button class="search-btn" type="submit">Track</button>
  </form>

  <div class="locate-row">
    <button class="locate-btn" id="locate-btn" type="button" aria-label="Find routes near my location">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <circle cx="10" cy="8.5" r="3"/>
        <path d="M10 2a6.5 6.5 0 0 1 6.5 6.5c0 4-6.5 9.5-6.5 9.5S3.5 12.5 3.5 8.5A6.5 6.5 0 0 1 10 2z"/>
      </svg>
      Routes near me
    </button>
    <div class="locate-spinner" id="locate-spinner" role="status" aria-label="Finding location"></div>
    <span class="locate-area" id="locate-area"></span>
  </div>
</div>

<main>

  <!-- RECENTLY VIEWED -->
  <section id="recent-section" aria-label="Recently viewed routes">
    <div class="section-head">
      <span class="section-label">Recently Viewed</span>
    </div>
    <div class="recent-list" id="recent-list"></div>
  </section>

  <!-- NEARBY / POPULAR -->
  <section id="nearby-section" aria-label="Routes near you">
    <div class="section-head">
      <span class="section-label" id="nearby-label">Near You</span>
      <a class="browse-link" href="#popular-section">Browse all</a>
    </div>
    <div class="bus-grid" id="nearby-grid"></div>
  </section>

  <!-- POPULAR ROUTES -->
  <section id="popular-section" aria-label="Popular Metro bus routes">
    <div class="section-head">
      <span class="section-label" id="popular-label">Metro Bus — Popular Routes</span>
    </div>
    <div class="bus-grid" id="bus-grid"></div>
  </section>

  <!-- OTHER AGENCIES -->
  <section class="section-other" aria-label="Other agencies">
    <div class="section-head">
      <span class="section-label">Other Agencies</span>
    </div>
    <div class="agency-card">
      <div class="agency-badge bbb">BBB</div>
      <div class="agency-info">
        <strong>Big Blue Bus (Santa Monica)</strong>
        <p>Coming soon — real-time vehicle feed is currently offline.</p>
      </div>
    </div>
  </section>

</main>

<script type="module">
import { METRO_BUS_FEATURED } from '/js/config.js';

// ── RENDER FULL BUS GRID ──
function renderGrid(container, routes) {
  container.innerHTML = '';
  routes.forEach(route => {
    const a = document.createElement('a');
    a.className = 'bus-card';
    a.href = `/line/metro-${route.code}`;
    a.innerHTML = `
      <div class="bus-badge">${route.code}</div>
      <span class="bus-desc">${route.desc}</span>
    `;
    container.appendChild(a);
  });
}

renderGrid(document.getElementById('bus-grid'), METRO_BUS_FEATURED);

// ── RECENTLY VIEWED ──
function loadRecent() {
  const recent = JSON.parse(localStorage.getItem('recent_lines') || '[]');
  if (!recent.length) return;
  const section = document.getElementById('recent-section');
  section.style.display = 'block';
  const list = document.getElementById('recent-list');
  list.innerHTML = '';
  recent.slice(0, 8).forEach(item => {
    const a = document.createElement('a');
    a.className = 'recent-chip';
    a.href = `/line/${item.slug}`;
    a.innerHTML = `
      <span class="recent-dot" style="background:${item.color}"></span>
      ${item.label}
    `;
    list.appendChild(a);
  });
}
loadRecent();

// ── LOCATION / NEARBY ──
const locateBtn    = document.getElementById('locate-btn');
const locateArea   = document.getElementById('locate-area');
const locateSpinner = document.getElementById('locate-spinner');
const nearbySection = document.getElementById('nearby-section');
const nearbyLabel  = document.getElementById('nearby-label');
const nearbyGrid   = document.getElementById('nearby-grid');
const popularLabel = document.getElementById('popular-label');

locateBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    locateArea.textContent = 'Geolocation not supported.';
    locateArea.style.display = 'inline';
    return;
  }

  locateBtn.style.display = 'none';
  locateSpinner.style.display = 'block';

  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;

      // Reverse geocode to get neighborhood name
      let areaName = 'Your Area';
      try {
        const geo = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
          { headers: { 'Accept-Language': 'en' } }
        );
        const geoData = await geo.json();
        const addr = geoData.address || {};
        areaName = addr.neighbourhood || addr.suburb || addr.city_district
                || addr.town || addr.city || 'Your Area';
      } catch (_) { /* keep default */ }

      locateSpinner.style.display = 'none';
      locateArea.textContent = `📍 ${areaName}`;
      locateArea.style.display = 'inline';

      // Show nearby section with area name
      nearbyLabel.textContent = `Near ${areaName}`;
      // For now show all featured routes sorted by code;
      // future: filter by proximity to stops via /api/nearby
      renderGrid(nearbyGrid, METRO_BUS_FEATURED);
      nearbySection.style.display = 'block';

      // Retitle the full list
      popularLabel.textContent = 'All Popular Routes';

      // Smooth-scroll to nearby section
      nearbySection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    },
    err => {
      locateSpinner.style.display = 'none';
      locateBtn.style.display = 'flex';
      if (err.code === 1) {
        locateArea.textContent = 'Location access denied.';
        locateArea.style.display = 'inline';
      }
    }
  );
});

// ── SEARCH ──
document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const val = document.getElementById('search-input').value.trim().toUpperCase();
  if (!val) return;
  window.location.href = `/line/metro-${val}`;
});
</script>
</body>
</html>
