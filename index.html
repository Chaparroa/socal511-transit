<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoCal 511 Transit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --metro:   #0072CE;
      --bg:      #F2F4F8;
      --surface: #FFFFFF;
      --border:  #E2E8F0;
      --text:    #0F1923;
      --muted:   #64748B;
      --subtle:  #94A3B8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── STICKY HEADER ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px 13px;
    }
    .wordmark {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .wordmark span { font-weight: 400; color: var(--muted); }
    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #16A34A;
      background: #DCFCE7;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #16A34A;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.25rem 1.1rem 0;
    }

    /* ── LOCATION SECTION ── */
    #loc-section { margin-bottom: 1.5rem; }

    .loc-cta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      text-align: center;
    }
    .loc-cta-icon { font-size: 2rem; margin-bottom: 0.6rem; line-height: 1; }
    .loc-cta-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
    .loc-cta-sub {
      font-size: 0.82rem; color: var(--muted); margin-bottom: 1.1rem; line-height: 1.5;
    }
    .loc-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      background: var(--metro);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .loc-cta-btn:hover { background: #005fad; }
    .loc-cta-btn svg { width: 16px; height: 16px; }

    .loc-loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .spinner-sm {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--metro);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .nearby-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .nearby-bar-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
    }
    .nearby-bar-label svg { width: 13px; height: 13px; color: var(--metro); flex-shrink: 0; }
    .nearby-bar-label strong { color: var(--text); }
    .nearby-change-btn {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--metro);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    .nearby-change-btn:hover { text-decoration: underline; }

    /* ── ROUTE ROWS ── */
    .route-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .route-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .route-row:last-child { border-bottom: none; }
    .route-row:hover  { background: #F8FAFC; }
    .route-row:active { background: #EFF4FB; }
    .route-row-badge {
      min-width: 46px;
      padding: 4px 9px;
      background: var(--metro);
      color: #fff;
      font-weight: 800;
      font-size: 0.88rem;
      border-radius: 7px;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }
    .route-row-name {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .route-row-dist {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--subtle);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .route-row-arrow { flex-shrink: 0; color: var(--subtle); }
    .no-nearby {
      padding: 1.25rem;
      font-size: 0.84rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── SECTION HEAD ── */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── RECENTLY VIEWED ── */
    #recent-section { display: none; margin-bottom: 1.75rem; }
    .recent-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .recent-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      transition: border-color 0.12s, color 0.12s;
    }
    .recent-chip:hover { border-color: var(--metro); color: var(--metro); }
    .recent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── VIEW ALL ROUTES ── */
    #all-routes-section { margin-bottom: 1.75rem; }

    .all-routes-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--metro);
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .all-routes-btn:hover { background: #F8FAFC; }
    .all-routes-btn svg { transition: transform 0.2s; }
    .all-routes-btn.open svg { transform: rotate(180deg); }

    #all-routes-list {
      margin-top: 0.75rem;
    }
    .bus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
      gap: 7px;
    }
    .bus-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 11px 6px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s;
    }
    .bus-card:hover {
      box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      transform: translateY(-1px);
      border-color: #C5D6EE;
    }
    .bus-badge {
      color: #fff;
      font-weight: 800;
      font-size: 0.86rem;
      padding: 3px 7px;
      border-radius: 7px;
      min-width: 36px;
      text-align: center;
      letter-spacing: -0.01em;
    }
    .bus-desc {
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      max-width: 64px;
    }

    .routes-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1.5rem;
      font-size: 0.84rem;
      color: var(--muted);
    }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 10px 14px max(env(safe-area-inset-bottom, 0px), 10px);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .bar-inner { max-width: 680px; margin: 0 auto; }

    .search-form {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 4px 0 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-form:focus-within {
      border-color: var(--metro);
      box-shadow: 0 0 0 3px rgba(0,114,206,0.1);
    }
    .search-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--subtle); }
    .search-input {
      flex: 1;
      padding: 10px 10px;
      border: none;
      background: transparent;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: var(--subtle); }
    .search-btn {
      padding: 7px 12px;
      background: var(--metro);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 36px;
    }
    .search-btn:hover { background: #005fad; }

    /* Favorites row in bottom bar */
    #fav-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .fav-row-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #fav-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #fav-chips::-webkit-scrollbar { display: none; }
    .fav-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .fav-chip:hover { opacity: 0.85; }
    .fav-chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      .bus-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    }
  </style>
</head>
<body>

<!-- STICKY HEADER -->
<div class="app-header">
  <div class="app-bar">
    <span class="wordmark">SoCal 511 <span>Transit</span></span>
    <div class="live-pill">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>
</div>

<main>

  <!-- LOCATION SECTION -->
  <section id="loc-section">

    <div id="loc-idle">
      <div class="loc-cta-card">
        <div class="loc-cta-icon">📍</div>
        <h2 class="loc-cta-title">Find routes near you</h2>
        <p class="loc-cta-sub">See which Metro lines stop closest to your location</p>
        <button class="loc-cta-btn" id="locate-btn">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="10" cy="8.5" r="3"/>
            <path d="M10 2a6.5 6.5 0 0 1 6.5 6.5c0 4-6.5 9.5-6.5 9.5S3.5 12.5 3.5 8.5A6.5 6.5 0 0 1 10 2z"/>
          </svg>
          Use my location
        </button>
      </div>
    </div>

    <div id="loc-loading" hidden>
      <div class="loc-loading-row">
        <div class="spinner-sm"></div>
        Finding routes near you…
      </div>
    </div>

    <div id="loc-active" hidden>
      <div class="nearby-bar">
        <div class="nearby-bar-label">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <circle cx="10" cy="8.5" r="2.5"/>
            <path fill-rule="evenodd" d="M10 2a6.5 6.5 0 0 0-6.5 6.5c0 4 6.5 9.5 6.5 9.5s6.5-5.5 6.5-9.5A6.5 6.5 0 0 0 10 2zm0 9a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" clip-rule="evenodd"/>
          </svg>
          Near <strong id="area-name">You</strong>
        </div>
        <button class="nearby-change-btn" id="loc-reset" aria-label="Change location">Change</button>
      </div>
      <div class="route-list" id="nearby-list"></div>
    </div>

  </section>

  <!-- RECENTLY VIEWED -->
  <section id="recent-section" aria-label="Recently viewed routes">
    <div class="section-head">
      <span class="section-label">Recently Viewed</span>
    </div>
    <div class="recent-list" id="recent-list"></div>
  </section>

  <!-- VIEW ALL ROUTES -->
  <section id="all-routes-section" aria-label="All Metro bus routes">
    <button class="all-routes-btn" id="all-routes-btn" aria-expanded="false">
      <span id="all-routes-btn-label">View all Metro bus lines</span>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M4.5 6.75 9 11.25l4.5-4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="all-routes-list" hidden></div>
  </section>

</main>

<!-- STICKY BOTTOM BAR -->
<div id="bottom-bar">
  <div class="bar-inner">
    <form class="search-form" id="search-form" role="search">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/>
      </svg>
      <input class="search-input" id="search-input" type="search"
        placeholder="Route number (720, 4, 20…)" autocomplete="off" aria-label="Search for a route" />
      <button class="search-btn" type="submit">Track</button>
    </form>
    <div id="fav-row" role="list" aria-label="Favorite routes">
      <span class="fav-row-label">Favorites</span>
      <div id="fav-chips"></div>
    </div>
  </div>
</div>

<script type="module">
// ── DISTANCE FORMATTING ──
function fmtDist(meters) {
  const feet = Math.round(meters * 3.28084);
  if (feet < 1000) return `${feet} ft`;
  return `${(meters / 1609.344).toFixed(1)} mi`;
}

// ── ARROW SVG ──
const ARROW_SVG = `<svg class="route-row-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
  <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ── RENDER NEARBY LIST ──
// routes: [{code, distanceM}] sorted by distance
function renderNearbyList(routes) {
  const list = document.getElementById('nearby-list');
  list.innerHTML = '';

  if (!routes.length) {
    list.innerHTML = '<p class="no-nearby">No Metro routes found within walking distance.</p>';
    return;
  }

  routes.forEach(({ code, distanceM }) => {
    const a = document.createElement('a');
    a.className = 'route-row';
    a.href = `/line/metro-${code}`;
    const distHtml = distanceM != null
      ? `<span class="route-row-dist">${fmtDist(distanceM)}</span>`
      : '';
    a.innerHTML = `
      <span class="route-row-badge">${code}</span>
      <span class="route-row-name">Metro ${code}</span>
      ${distHtml}
      ${ARROW_SVG}`;
    list.appendChild(a);
  });
}

// ── LOCATION UI STATES ──
const locIdle    = document.getElementById('loc-idle');
const locLoading = document.getElementById('loc-loading');
const locActive  = document.getElementById('loc-active');

function showState(state) {
  locIdle.hidden    = state !== 'idle';
  locLoading.hidden = state !== 'loading';
  locActive.hidden  = state !== 'active';
}

// ── ACTIVATE WITH COORDS ──
async function activateLocation(lat, lng, area) {
  document.getElementById('area-name').textContent = area;
  showState('loading');

  let routes = [];
  try {
    const res  = await fetch(`/api/nearby?lat=${lat}&lng=${lng}`);
    const data = await res.json();
    if (!data.fallback) routes = data.routes || [];
  } catch (_) {}

  renderNearbyList(routes);
  showState('active');
  localStorage.setItem('saved_location', JSON.stringify({ lat, lng, area }));
}

// ── GEOLOCATION FLOW ──
async function doLocate() {
  if (!navigator.geolocation) return;
  showState('loading');

  navigator.geolocation.getCurrentPosition(
    async ({ coords: { latitude: lat, longitude: lng } }) => {
      let area = 'Your Area';
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
          { headers: { 'Accept-Language': 'en' } }
        );
        const d = await res.json();
        const a = d.address || {};
        area = a.neighbourhood || a.suburb || a.city_district
             || a.town || a.city || 'Your Area';
      } catch (_) {}

      await activateLocation(lat, lng, area);
    },
    () => showState('idle')
  );
}

document.getElementById('locate-btn').addEventListener('click', doLocate);
document.getElementById('loc-reset').addEventListener('click', () => {
  localStorage.removeItem('saved_location');
  showState('idle');
});

const saved = JSON.parse(localStorage.getItem('saved_location') || 'null');
if (saved) activateLocation(saved.lat, saved.lng, saved.area);
else showState('idle');

// ── RECENTLY VIEWED ──
function loadRecent() {
  const recent = JSON.parse(localStorage.getItem('recent_lines') || '[]');
  if (!recent.length) return;
  document.getElementById('recent-section').style.display = 'block';
  const list = document.getElementById('recent-list');
  list.innerHTML = '';
  recent.slice(0, 8).forEach(item => {
    const a = document.createElement('a');
    a.className = 'recent-chip';
    a.href = `/line/${item.slug}`;
    a.innerHTML = `<span class="recent-dot" style="background:${item.color}"></span>${item.label}`;
    list.appendChild(a);
  });
}
loadRecent();

// ── FAVORITES ──
function loadFavorites() {
  const favs = JSON.parse(localStorage.getItem('favorite_lines') || '[]');
  const row   = document.getElementById('fav-row');
  const chips = document.getElementById('fav-chips');
  chips.innerHTML = '';

  if (!favs.length) {
    row.style.display = 'none';
    syncPadding();
    return;
  }

  row.style.display = 'flex';
  favs.forEach(fav => {
    const a = document.createElement('a');
    a.className = 'fav-chip';
    a.href = `/line/${fav.slug}`;
    a.style.background = fav.color || 'var(--metro)';
    a.setAttribute('role', 'listitem');
    a.innerHTML = `<span class="fav-chip-dot"></span>${fav.label}`;
    chips.appendChild(a);
  });

  syncPadding();
}
loadFavorites();

// ── SYNC BOTTOM PADDING ──
function syncPadding() {
  const bar = document.getElementById('bottom-bar');
  document.querySelector('main').style.paddingBottom = (bar.offsetHeight + 20) + 'px';
}
syncPadding();
window.addEventListener('resize', syncPadding);

// ── VIEW ALL ROUTES ──
let allRoutesLoaded = false;
let allRoutesOpen   = false;

const allBtn  = document.getElementById('all-routes-btn');
const allList = document.getElementById('all-routes-list');

allBtn.addEventListener('click', async () => {
  allRoutesOpen = !allRoutesOpen;
  allBtn.setAttribute('aria-expanded', String(allRoutesOpen));
  allBtn.classList.toggle('open', allRoutesOpen);
  document.getElementById('all-routes-btn-label').textContent = allRoutesOpen
    ? 'Hide Metro bus lines'
    : 'View all Metro bus lines';

  if (!allRoutesOpen) {
    allList.hidden = true;
    return;
  }

  allList.hidden = false;

  if (allRoutesLoaded) return;

  allList.innerHTML = `<div class="routes-loading"><div class="spinner-sm"></div> Loading all routes…</div>`;

  try {
    const res  = await fetch('/api/routes');
    const data = await res.json();
    const routes = data.routes || [];

    if (!routes.length) throw new Error('No routes returned');

    const grid = document.createElement('div');
    grid.className = 'bus-grid';
    routes.forEach(r => {
      const a = document.createElement('a');
      a.className = 'bus-card';
      a.href = `/line/metro-${r.code}`;
      a.innerHTML = `
        <div class="bus-badge" style="background:${r.color || 'var(--metro)'}">${r.code}</div>
        <span class="bus-desc">${r.name || ''}</span>`;
      grid.appendChild(a);
    });

    allList.innerHTML = '';
    allList.appendChild(grid);
    allRoutesLoaded = true;
  } catch (err) {
    allList.innerHTML = `<p class="no-nearby">Could not load routes — ${err.message}</p>`;
  }
});

// ── SEARCH ──
document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const val = document.getElementById('search-input').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!val) return;
  window.location.href = `/line/metro-${val}`;
});

// Listen for storage changes (e.g. user favorites from the line page in same session)
window.addEventListener('storage', e => {
  if (e.key === 'favorite_lines') loadFavorites();
});
</script>
</body>
</html>
